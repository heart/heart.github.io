<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} · {{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-row">
        <a class="logo" href="{{ "/" | relative_url }}">CT</a>
        <nav class="site-nav">
          <a href="{{ "/" | relative_url }}#about">About</a>
          <a href="{{ "/" | relative_url }}#projects">Projects</a>
          <a href="{{ "/" | relative_url }}#writing">Writing</a>
          <a href="{{ "/" | relative_url }}#contact">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container footer-row">
        <div>© {{ "now" | date: "%Y" }} {{ site.title }}</div>
        <div class="footer-links">
          <a href="https://github.com/" aria-label="GitHub">GitHub</a>
          <a href="https://linkedin.com/" aria-label="LinkedIn">LinkedIn</a>
          <a href="mailto:you@company.com" aria-label="Email">Email</a>
        </div>
      </div>
    </footer>
  </body>
</html>
