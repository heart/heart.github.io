<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} · {{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  </head>
  <body>
    <div class="bg">
      <div class="grain"></div>
      <div class="glow glow-1"></div>
      <div class="glow glow-2"></div>
    </div>

    <header class="site-header">
      <div class="container">
        <div class="brand">
          <div class="brand-mark"></div>
          <div>
            <div class="brand-title">{{ site.title }}</div>
            <div class="brand-sub">{{ site.description }}</div>
          </div>
        </div>
        <nav class="site-nav">
          <a href="{{ "/" | relative_url }}#about">About</a>
          <a href="{{ "/" | relative_url }}#insights">Insights</a>
          <a href="{{ "/" | relative_url }}#contact">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-inner">
          <div>© {{ "now" | date: "%Y" }} {{ site.title }}</div>
          <div class="footer-links">
            <a href="{{ "/" | relative_url }}#insights">Articles</a>
            <a href="{{ "/" | relative_url }}#contact">Work with me</a>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
